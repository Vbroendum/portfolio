name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/portfolio-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/portfolio-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to swarm
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images on the swarm node
            docker pull ghcr.io/${{ github.repository_owner }}/portfolio-api:latest
            docker pull ghcr.io/${{ github.repository_owner }}/portfolio-frontend:latest

            # Deploy (or update) the stack — same command for first deploy and updates
            GITHUB_USERNAME=${{ github.repository_owner }} \
              docker stack deploy \
                --compose-file ~/stacks/portfolio/portfolio-stack.yml \
                --with-registry-auth \
                portfolio

            # Force services to pick up the new image even if tag hasn't changed
            docker service update --force portfolio_api
            docker service update --force portfolio_frontend

            # Cleanup old images
            docker image prune -f
